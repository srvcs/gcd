schemaVersion: 1
name: "srvcs-gcd"
slug: "gcd"
repository: "srvcs/gcd"
package: "srvcs-gcd"
function: "number theory: greatest common divisor"
kind: "orchestrator"
categories:
  - "number-theory"
dependencies:
  - slug: "modulo"
    service: "srvcs-modulo"
  - slug: "iszero"
    service: "srvcs-iszero"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "a"
    type: "integer"
    required: true
  - name: "b"
    type: "integer"
    required: true
outputs:
  - name: "a"
    type: "integer"
  - name: "b"
    type: "integer"
  - name: "result"
    type: "integer"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_ISZERO_URL"
    default: "http://127.0.0.1:8085"
    purpose: "Base URL for srvcs-iszero"
  - name: "SRVCS_MODULO_URL"
    default: "http://127.0.0.1:8084"
    purpose: "Base URL for srvcs-modulo"
